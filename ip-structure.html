<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Address Structure Animation</title>
    <style>
        :root {
            --color-light-blue: #2EB4FF;
            --color-dark-blue: #0075DB;
            --color-gray: #757D86;
            --color-dark: #181D24;
            --color-bg: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-bg);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: var(--color-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .stage {
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 65vh;
        }

        .ui-panel {
            background: var(--color-bg);
            border-top: 4px solid var(--color-dark-blue);
            box-shadow: 0 -10px 40px rgba(117, 125, 134, 0.15);
            padding: 2rem;
            border-radius: 24px 24px 0 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 220px;
        }

        .step-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 0.5rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--color-gray);
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--color-light-blue);
            opacity: 1;
            transform: scale(1.2);
        }

        .dot.completed {
            background-color: var(--color-dark-blue);
            opacity: 1;
        }

        h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--color-dark-blue);
        }

        p {
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--color-gray);
            flex-grow: 1;
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        button {
            background-color: var(--color-dark-blue);
            color: var(--color-bg);
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 117, 219, 0.3);
        }

        button:hover {
            background-color: var(--color-light-blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(46, 180, 255, 0.4);
        }

        button:disabled {
            background-color: var(--color-gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        /* Smooth Transitions for SVG Elements */
        .anim-group {
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .anim-fade {
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .anim-color {
            transition: fill 0.8s ease, stroke 0.8s ease;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="stage">
        <!-- SVG Canvas -->
        <svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#181D24" flood-opacity="0.1"/>
                </filter>
            </defs>

            <!-- MAIN IP INFOGRAPHIC GROUP -->
            <g id="ip-infographic" class="anim-group" transform="translate(100, 100)">
                
                <!-- Main Labels -->
                <text id="label-title" x="500" y="0" font-family="system-ui" font-size="24" font-weight="bold" fill="#181D24" text-anchor="middle" class="anim-fade">כתובת ה-IP (גרסה 4)</text>
                
                <!-- Sublabels for Network vs Host (Hidden Initially) -->
                <g id="split-labels" opacity="0" class="anim-fade" transform="translate(0, -30)">
                    <rect x="70" y="-30" width="610" height="30" rx="8" fill="#0075DB" opacity="0.1" />
                    <text x="375" y="-10" font-family="system-ui" font-size="18" font-weight="bold" fill="#0075DB" text-anchor="middle">רשת (Network)</text>
                    
                    <rect x="730" y="-30" width="190" height="30" rx="8" fill="#2EB4FF" opacity="0.1" />
                    <text x="825" y="-10" font-family="system-ui" font-size="18" font-weight="bold" fill="#2EB4FF" text-anchor="middle">מארח (Host)</text>
                </g>

                <!-- 4 Octets (Decimal) -->
                <g transform="translate(0, 40)">
                    <!-- Octet 1 -->
                    <rect x="70" y="0" width="170" height="80" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#757D86" stroke-width="2" id="box-1" class="anim-color"/>
                    <text x="155" y="55" font-family="monospace" font-size="48" font-weight="bold" fill="#181D24" text-anchor="middle" id="text-1" class="anim-color">192</text>
                    
                    <circle cx="280" cy="40" r="6" fill="#757D86" class="anim-fade" id="dot-1"/>
                    
                    <!-- Octet 2 -->
                    <rect x="290" y="0" width="170" height="80" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#757D86" stroke-width="2" id="box-2" class="anim-color"/>
                    <text x="375" y="55" font-family="monospace" font-size="48" font-weight="bold" fill="#181D24" text-anchor="middle" id="text-2" class="anim-color">168</text>
                    
                    <circle cx="500" cy="40" r="6" fill="#757D86" class="anim-fade" id="dot-2"/>
                    
                    <!-- Octet 3 -->
                    <rect x="510" y="0" width="170" height="80" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#757D86" stroke-width="2" id="box-3" class="anim-color"/>
                    <text x="595" y="55" font-family="monospace" font-size="48" font-weight="bold" fill="#181D24" text-anchor="middle" id="text-3" class="anim-color">1</text>
                    
                    <circle cx="720" cy="40" r="6" fill="#757D86" class="anim-fade" id="dot-3"/>
                    
                    <!-- Octet 4 -->
                    <rect x="730" y="0" width="170" height="80" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#757D86" stroke-width="2" id="box-4" class="anim-color"/>
                    <text x="815" y="55" font-family="monospace" font-size="48" font-weight="bold" fill="#181D24" text-anchor="middle" id="text-4" class="anim-color">10</text>
                </g>

                <!-- Binary Breakdown (Hidden Initially) -->
                <g id="binary-group" opacity="0" class="anim-fade" transform="translate(0, 160)">
                    <text x="500" y="-15" font-family="system-ui" font-size="16" font-weight="bold" fill="#757D86" text-anchor="middle">תרגום לבינארי (32 ביטים - 8 בכל קבוצה)</text>
                    
                    <!-- Lines connecting decimal to binary -->
                    <path d="M 155 -30 L 155 0" stroke="#757D86" stroke-width="2" stroke-dasharray="4" />
                    <path d="M 375 -30 L 375 0" stroke="#757D86" stroke-width="2" stroke-dasharray="4" />
                    <path d="M 595 -30 L 595 0" stroke="#757D86" stroke-width="2" stroke-dasharray="4" />
                    <path d="M 815 -30 L 815 0" stroke="#757D86" stroke-width="2" stroke-dasharray="4" />

                    <!-- Binary Texts -->
                    <rect x="70" y="10" width="170" height="40" rx="8" fill="#F4F5F7" id="bin-bg-1" class="anim-color"/>
                    <text x="155" y="35" font-family="monospace" font-size="18" font-weight="bold" fill="#757D86" text-anchor="middle" id="bin-1" class="anim-color" letter-spacing="2">11000000</text>

                    <rect x="290" y="10" width="170" height="40" rx="8" fill="#F4F5F7" id="bin-bg-2" class="anim-color"/>
                    <text x="375" y="35" font-family="monospace" font-size="18" font-weight="bold" fill="#757D86" text-anchor="middle" id="bin-2" class="anim-color" letter-spacing="2">10101000</text>

                    <rect x="510" y="10" width="170" height="40" rx="8" fill="#F4F5F7" id="bin-bg-3" class="anim-color"/>
                    <text x="595" y="35" font-family="monospace" font-size="18" font-weight="bold" fill="#757D86" text-anchor="middle" id="bin-3" class="anim-color" letter-spacing="2">00000001</text>

                    <rect x="730" y="10" width="170" height="40" rx="8" fill="#F4F5F7" id="bin-bg-4" class="anim-color"/>
                    <text x="815" y="35" font-family="monospace" font-size="18" font-weight="bold" fill="#757D86" text-anchor="middle" id="bin-4" class="anim-color" letter-spacing="2">00001010</text>
                </g>

                <!-- Subnet Mask Group (Hidden Initially) -->
                <g id="mask-group" opacity="0" class="anim-fade" transform="translate(0, 260)">
                    <!-- Subnet Mask Divider Line -->
                    <line x1="70" y1="-20" x2="900" y2="-20" stroke="#181D24" stroke-width="1" stroke-dasharray="8" opacity="0.2"/>
                    <text x="500" y="0" font-family="system-ui" font-size="18" font-weight="bold" fill="#181D24" text-anchor="middle">Subnet Mask (מסכת רשת)</text>
                    
                    <rect x="70" y="15" width="170" height="60" rx="12" fill="#0075DB" opacity="0.1" />
                    <text x="155" y="45" font-family="monospace" font-size="24" font-weight="bold" fill="#0075DB" text-anchor="middle">255</text>
                    <text x="155" y="65" font-family="monospace" font-size="14" font-weight="bold" fill="#0075DB" text-anchor="middle" letter-spacing="1">11111111</text>

                    <rect x="290" y="15" width="170" height="60" rx="12" fill="#0075DB" opacity="0.1" />
                    <text x="375" y="45" font-family="monospace" font-size="24" font-weight="bold" fill="#0075DB" text-anchor="middle">255</text>
                    <text x="375" y="65" font-family="monospace" font-size="14" font-weight="bold" fill="#0075DB" text-anchor="middle" letter-spacing="1">11111111</text>

                    <rect x="510" y="15" width="170" height="60" rx="12" fill="#0075DB" opacity="0.1" />
                    <text x="595" y="45" font-family="monospace" font-size="24" font-weight="bold" fill="#0075DB" text-anchor="middle">255</text>
                    <text x="595" y="65" font-family="monospace" font-size="14" font-weight="bold" fill="#0075DB" text-anchor="middle" letter-spacing="1">11111111</text>

                    <rect x="730" y="15" width="170" height="60" rx="12" fill="#2EB4FF" opacity="0.1" />
                    <text x="815" y="45" font-family="monospace" font-size="24" font-weight="bold" fill="#2EB4FF" text-anchor="middle">0</text>
                    <text x="815" y="65" font-family="monospace" font-size="14" font-weight="bold" fill="#2EB4FF" text-anchor="middle" letter-spacing="1">00000000</text>
                </g>

                <!-- The "Divider" Box showing Network vs Host physically -->
                <g id="split-box" opacity="0" class="anim-fade" transform="translate(0, 30)">
                    <rect x="60" y="0" width="630" height="100" rx="20" fill="none" stroke="#0075DB" stroke-width="4" stroke-dasharray="10" />
                    <rect x="720" y="0" width="190" height="100" rx="20" fill="none" stroke="#2EB4FF" stroke-width="4" stroke-dasharray="10" />
                </g>
            </g>


            <!-- TOPOLOGY GROUP (Hidden initially, shown in step 4) -->
            <g id="topology-group" opacity="0" class="anim-fade" transform="translate(0, 0)">
                <!-- Wires -->
                <path d="M 350 400 L 600 400" stroke="#757D86" stroke-width="6" fill="none" />
                <path d="M 600 400 L 900 400" stroke="#2EB4FF" stroke-width="6" stroke-dasharray="12 8" fill="none" />
                
                <!-- LAN Area (Left) -->
                <rect x="100" y="200" width="400" height="300" rx="24" fill="#F4F5F7" stroke="#757D86" stroke-width="2" stroke-dasharray="8" />
                <text x="300" y="240" font-family="system-ui" font-size="20" font-weight="bold" fill="#757D86" text-anchor="middle">רשת מקומית (LAN)</text>
                <text x="300" y="265" font-family="system-ui" font-size="16" fill="#757D86" text-anchor="middle">כתובות פרטיות בלבד</text>

                <!-- The Router (Middle) -->
                <g transform="translate(560, 350)">
                    <rect x="0" y="0" width="80" height="100" rx="12" fill="#181D24" filter="url(#shadow)"/>
                    <line x1="20" y1="0" x2="20" y2="-30" stroke="#181D24" stroke-width="4" stroke-linecap="round"/>
                    <line x1="60" y1="0" x2="60" y2="-30" stroke="#181D24" stroke-width="4" stroke-linecap="round"/>
                    <rect x="10" y="10" width="60" height="80" rx="6" fill="#0075DB"/>
                    <text x="40" y="55" font-family="system-ui" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">NAT</text>
                </g>

                <!-- WAN Area (Right) -->
                <rect x="700" y="200" width="400" height="300" rx="24" fill="#EAF7FF" stroke="#2EB4FF" stroke-width="2" />
                <text x="900" y="240" font-family="system-ui" font-size="20" font-weight="bold" fill="#0075DB" text-anchor="middle">האינטרנט (WAN)</text>
                
                <!-- Cloud Icon -->
                <g transform="translate(850, 320)">
                    <path d="M25,60 C11.19,60 0,48.81 0,35 C0,22.18 9.68,11.63 22.14,10.22 C26.65,3.95 34.19,0 42.5,0 C56.31,0 67.5,11.19 67.5,25 C67.5,25.43 67.48,25.86 67.43,26.28 C74.52,28.6 79.5,35.34 79.5,43.25 C79.5,52.5 71.99,60 62.75,60 L25,60 Z" fill="#2EB4FF" opacity="0.2"/>
                    <path d="M40,75 C26.19,75 15,63.81 15,50 C15,37.18 24.68,26.63 37.14,25.22 C41.65,18.95 49.19,15 57.5,15 C71.31,15 82.5,26.19 82.5,40 C82.5,40.43 82.48,40.86 82.43,41.28 C89.52,43.6 94.5,50.34 94.5,58.25 C94.5,67.5 86.99,75 77.75,75 L40,75 Z" fill="#2EB4FF" opacity="0.8"/>
                    <rect x="30" y="85" width="140" height="30" rx="6" fill="#0075DB" filter="url(#shadow)"/>
                    <text x="100" y="105" font-family="monospace" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dir="ltr">Pub: 82.166.50.50</text>
                </g>
            </g>
            
        </svg>
    </div>

    <!-- UI PANEL -->
    <div class="ui-panel">
        <div class="step-indicator">
            <div class="dot active" id="dot-0"></div>
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
            <div class="dot" id="dot-4"></div>
        </div>
        <h2 id="ui-title">מבנה כתובת ה-IP</h2>
        <p id="ui-desc">כתובת IP (גרסה 4) היא ה"תעודת זהות" של המכשיר ברשת. היא מורכבת מ-4 מספרים עשרוניים המופרדים בנקודה. בואו נבין איך היא בנויה מבפנים.</p>
        <div class="controls">
            <button id="next-btn" onclick="nextStep()">התחל למידה</button>
        </div>
    </div>
</div>

<script>
    const colors = {
        defaultBox: '#757D86',
        network: '#0075DB',
        host: '#2EB4FF',
        textDark: '#181D24',
        textLight: '#FFFFFF'
    };

    let currentStep = 0;
    let isAnimating = false;

    // DOM Elements
    const ipGroup = document.getElementById('ip-infographic');
    const binGroup = document.getElementById('binary-group');
    const maskGroup = document.getElementById('mask-group');
    const splitLabels = document.getElementById('split-labels');
    const splitBox = document.getElementById('split-box');
    const topologyGroup = document.getElementById('topology-group');
    
    // Boxes and Texts
    const boxes = [document.getElementById('box-1'), document.getElementById('box-2'), document.getElementById('box-3'), document.getElementById('box-4')];
    const texts = [document.getElementById('text-1'), document.getElementById('text-2'), document.getElementById('text-3'), document.getElementById('text-4')];
    const binBgs = [document.getElementById('bin-bg-1'), document.getElementById('bin-bg-2'), document.getElementById('bin-bg-3'), document.getElementById('bin-bg-4')];
    const bins = [document.getElementById('bin-1'), document.getElementById('bin-2'), document.getElementById('bin-3'), document.getElementById('bin-4')];
    const dots = [document.getElementById('dot-1'), document.getElementById('dot-2'), document.getElementById('dot-3')];
    
    const uiTitle = document.getElementById('ui-title');
    const uiDesc = document.getElementById('ui-desc');
    const nextBtn = document.getElementById('next-btn');

    const stepsData = [
        {
            title: "מבנה כתובת ה-IP",
            desc: "כתובת IP (גרסה 4) היא ה'תעודת זהות' של המכשיר ברשת. היא מורכבת מ-4 מספרים (אוקטטות) המופרדים בנקודה. כל מספר יכול להיות בין 0 ל-255.",
            btn: "התחל למידה",
            action: () => { 
                resetVisuals(); 
            }
        },
        {
            title: "שלב 1: מתחת למכסה המנוע (בינארי)",
            desc: "מחשבים לא מבינים מספרים רגילים, אלא רק 1 ו-0. הכתובת בעצם מורכבת מ-32 ביטים בסך הכל (8 ביטים לכל חלק). לכן קוראים לכל חלק 'אוקטטה'.",
            btn: "המשך לשלב הבא",
            action: () => { 
                binGroup.style.opacity = '1';
                binGroup.style.transform = 'translate(0, 140)';
            }
        },
        {
            title: "שלב 2: תפקיד מסכת הרשת (Subnet Mask)",
            desc: "כל כתובת IP מחולקת ל-2 חלקים: 'כתובת הרחוב' (רשת) ו'מספר הבית' (מארח). מי קובע איפה החיתוך? ה-Subnet Mask! היכן שיש '255' (או אחדות בבינארי) - זה שייך לרשת.",
            btn: "המשך לשלב הבא",
            action: () => { 
                maskGroup.style.opacity = '1';
                maskGroup.style.transform = 'translate(0, 240)';
            }
        },
        {
            title: "שלב 3: חלוקה לרשת ומארח (Network vs Host)",
            desc: "המסכה שלנו היא 255.255.255.0, ולכן 3 המספרים הראשונים (192.168.1) הם אזור הרשת - כל המחשבים במשרד חייבים להתחיל ככה. המספר האחרון (10) הוא המחשב הספציפי שלנו.",
            btn: "המשך לשלב הבא",
            action: () => { 
                splitLabels.style.opacity = '1';
                splitBox.style.opacity = '1';
                
                // Colorize Network (Dark Blue)
                for(let i=0; i<3; i++) {
                    boxes[i].setAttribute('stroke', colors.network);
                    texts[i].setAttribute('fill', colors.network);
                    binBgs[i].setAttribute('fill', 'rgba(0, 117, 219, 0.1)');
                    bins[i].setAttribute('fill', colors.network);
                }
                
                // Colorize Host (Light Blue)
                boxes[3].setAttribute('stroke', colors.host);
                texts[3].setAttribute('fill', colors.host);
                binBgs[3].setAttribute('fill', 'rgba(46, 180, 255, 0.1)');
                bins[3].setAttribute('fill', colors.host);
            }
        },
        {
            title: "שלב 4: כתובת פרטית מול ציבורית",
            desc: "הכתובת 192.168.x.x היא 'פרטית' - היא מותרת לשימוש רק בתוך הרשת המקומית (LAN) בבית או במשרד. כדי לצאת לאינטרנט (WAN), הראוטר מלווה למחשב 'כתובת ציבורית' ייחודית בעולם.",
            btn: "התחל מחדש",
            action: () => { 
                // Hide binary and mask for cleaner view
                binGroup.style.opacity = '0';
                maskGroup.style.opacity = '0';
                splitLabels.style.opacity = '0';
                splitBox.style.opacity = '0';
                
                // FIX: Center the IP address at the top of the canvas, above the LAN/WAN boxes
                ipGroup.style.transform = 'translate(310, 40) scale(0.6)';
                document.getElementById('label-title').style.opacity = '0'; // Hide main title
                
                // Reset dots and text colors to be solid for small view
                for(let i=0; i<4; i++) {
                    boxes[i].setAttribute('stroke', colors.defaultBox);
                    texts[i].setAttribute('fill', colors.textDark);
                }
                
                // Show Topology
                setTimeout(() => {
                    topologyGroup.style.opacity = '1';
                }, 500);
            }
        }
    ];

    function nextStep() {
        if (isAnimating) return;
        isAnimating = true;
        
        currentStep++;
        if (currentStep >= stepsData.length) currentStep = 0;
        
        updateUI();
        stepsData[currentStep].action();
        
        setTimeout(() => { isAnimating = false; }, 1000); // Prevent spam clicking
    }

    function updateUI() {
        const data = stepsData[currentStep];
        uiTitle.innerText = data.title;
        uiDesc.innerText = data.desc;
        nextBtn.innerText = data.btn;

        for(let i=0; i<5; i++) {
            const dot = document.getElementById(`dot-${i}`);
            if (i < currentStep) dot.className = "dot completed";
            else if (i === currentStep) dot.className = "dot active";
            else dot.className = "dot";
        }
    }

    function resetVisuals() {
        // Reset Transforms and Opacities
        ipGroup.style.transform = 'translate(100, 100) scale(1)';
        document.getElementById('label-title').style.opacity = '1';
        
        binGroup.style.opacity = '0';
        binGroup.style.transform = 'translate(0, 160)'; // slightly down for fade-up effect
        
        maskGroup.style.opacity = '0';
        maskGroup.style.transform = 'translate(0, 260)';
        
        splitLabels.style.opacity = '0';
        splitBox.style.opacity = '0';
        topologyGroup.style.opacity = '0';
        
        // Reset Colors
        for(let i=0; i<4; i++) {
            boxes[i].setAttribute('stroke', colors.defaultBox);
            texts[i].setAttribute('fill', colors.textDark);
            binBgs[i].setAttribute('fill', '#F4F5F7');
            bins[i].setAttribute('fill', colors.defaultBox);
            if(i<3) dots[i].setAttribute('fill', colors.defaultBox);
        }
    }

    // Initialize UI
    updateUI();
</script>
</body>
</html>
