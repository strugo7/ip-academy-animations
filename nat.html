<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAT Process Animation</title>
    <style>
        :root {
            --color-light-blue: #2EB4FF;
            --color-dark-blue: #0075DB;
            --color-gray: #757D86;
            --color-dark: #181D24;
            --color-bg: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-bg);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: var(--color-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .stage {
            flex-grow: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 65vh;
            filter: drop-shadow(0 20px 30px rgba(24, 29, 36, 0.05));
        }

        .ui-panel {
            background: var(--color-bg);
            border-top: 4px solid var(--color-dark-blue);
            box-shadow: 0 -10px 40px rgba(117, 125, 134, 0.15);
            padding: 2rem;
            border-radius: 24px 24px 0 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 220px;
        }

        .step-indicator {
            display: flex;
            gap: 8px;
            margin-bottom: 0.5rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--color-gray);
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: var(--color-light-blue);
            opacity: 1;
            transform: scale(1.2);
        }

        .dot.completed {
            background-color: var(--color-dark-blue);
            opacity: 1;
        }

        h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--color-dark-blue);
        }

        p {
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--color-gray);
            flex-grow: 1;
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        button {
            background-color: var(--color-dark-blue);
            color: var(--color-bg);
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 117, 219, 0.3);
        }

        button:hover {
            background-color: var(--color-light-blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(46, 180, 255, 0.4);
        }

        button:disabled {
            background-color: var(--color-gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }

        .isometric-hover {
            transition: transform 0.3s ease;
        }
        g:hover > .isometric-hover {
            transform: translateY(-8px);
        }

        #nat-table {
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="stage">
        <!-- SVG Canvas -->
        <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#181D24" flood-opacity="0.15"/>
                </filter>
            </defs>

            <!-- ===================== DOM ORDER 1: WIRES ===================== -->
            <!-- Server (150, 300) to Router (400, 400) -->
            <path d="M 150 300 L 400 400" stroke="#2EB4FF" stroke-width="4" stroke-dasharray="8 6" fill="none" opacity="0.6" />
            <!-- Router (400, 400) to Switch (650, 450) -->
            <path d="M 400 400 L 650 450" stroke="#757D86" stroke-width="6" fill="none" opacity="0.4" />
            <!-- Switch (650, 450) to PC1 (900, 200) -->
            <path d="M 650 450 L 900 200" stroke="#757D86" stroke-width="3" fill="none" opacity="0.3" /> 
            <!-- Switch (650, 450) to PC2 (1000, 400) -->
            <path d="M 650 450 L 1000 400" stroke="#757D86" stroke-width="3" fill="none" opacity="0.3" /> 
            <!-- Switch (650, 450) to PC3 (900, 600) -->
            <path d="M 650 450 L 900 600" stroke="#757D86" stroke-width="3" fill="none" opacity="0.3" /> 
            <!-- Switch (650, 450) to PC4 (650, 650) -->
            <path d="M 650 450 L 650 650" stroke="#757D86" stroke-width="3" fill="none" opacity="0.3" /> 

            <!-- ===================== DOM ORDER 2: PC 1 (Top Right) ===================== -->
            <!-- Positioning Group -->
            <g transform="translate(900, 200)">
                <!-- Animation Group (Hover) -->
                <g class="isometric-hover">
                    <!-- Scaling Group -->
                    <g transform="scale(0.9)">
                        <polygon points="-100,10 0,60 100,10 0,-40" fill="rgba(24, 29, 36, 0.1)"/>
                        <polygon points="0,15 100,-35 100,-25 0,25" fill="#0075DB" />
                        <polygon points="-100,-35 0,15 0,25 -100,-25" fill="#181D24" />
                        <polygon points="-100,-35 0,15 100,-35 0,-85" fill="#757D86" />
                        <polygon points="-80,-40 -5,-3 70,-40 -5,-77" fill="#181D24" opacity="0.6" />
                        <polygon points="-100,-35 0,-85 0,-195 -100,-145" fill="#181D24" />
                        <polygon points="-95,-43 -5,-88 -5,-187 -95,-142" fill="#0075DB" /> <!-- Active Screen -->
                        
                        <text x="0" y="-235" font-family="system-ui" font-size="18" font-weight="bold" fill="#181D24" text-anchor="middle">מחשב 1</text>
                        <text x="0" y="-210" font-family="monospace" font-size="16" font-weight="bold" fill="#0075DB" text-anchor="middle" dir="ltr">IP: 192.168.1.10</text>
                    </g>
                </g>
            </g>

            <!-- ===================== DOM ORDER 3: SERVER (Top Left) ===================== -->
            <g transform="translate(150, 300)">
                <g class="isometric-hover">
                    <polygon points="-50,35 0,60 50,35 0,10" fill="rgba(24, 29, 36, 0.1)"/>
                    <polygon points="0,50 50,25 50,-75 0,-50" fill="#0075DB" />
                    <polygon points="-50,25 0,50 0,-50 -50,-75" fill="#181D24" />
                    <polygon points="-50,-75 0,-50 50,-75 0,-100" fill="#757D86" />
                    
                    <polygon points="-45,-65 -5,-45 -5,-40 -45,-60" fill="#2EB4FF" />
                    <polygon points="-45,-50 -5,-30 -5,-25 -45,-45" fill="#2EB4FF" />
                    <polygon points="-45,-35 -5,-15 -5,-10 -45,-30" fill="#2EB4FF" />
                    <circle cx="-10" cy="-45" r="2" fill="#FFFFFF" filter="url(#glow)"/>
                    <circle cx="-10" cy="-30" r="2" fill="#FFFFFF" filter="url(#glow)"/>
                    
                    <text x="0" y="-125" font-family="system-ui" font-size="16" font-weight="bold" fill="#181D24" text-anchor="middle">שרת (אינטרנט)</text>
                    <rect x="-50" y="70" width="100" height="24" rx="4" fill="#181D24" opacity="0.8"/>
                    <text x="0" y="87" font-family="monospace" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dir="ltr">8.8.8.8</text>
                </g>
            </g>

            <!-- ===================== DOM ORDER 4: ROUTER (Mid Left) ===================== -->
            <g transform="translate(400, 400)">
                <g class="isometric-hover">
                    <polygon points="-80,15 0,55 80,15 0,-25" fill="rgba(24, 29, 36, 0.1)"/>
                    
                    <!-- Antennas -->
                    <g stroke="#181D24" stroke-width="6" stroke-linecap="round">
                        <line x1="-40" y1="-40" x2="-40" y2="-120" />
                        <line x1="-20" y1="-50" x2="-20" y2="-130" />
                    </g>
                    <g stroke="#757D86" stroke-width="3" stroke-linecap="round">
                        <line x1="-40" y1="-40" x2="-40" y2="-118" />
                        <line x1="-20" y1="-50" x2="-20" y2="-128" />
                    </g>

                    <!-- Body -->
                    <polygon points="0,10 80,-30 80,-10 0,30" fill="#0075DB" />
                    <polygon points="-80,-30 0,10 0,30 -80,-10" fill="#181D24" />
                    <polygon points="-80,-30 0,10 80,-30 0,-70" fill="#757D86" />
                    
                    <!-- NAT Badge -->
                    <polygon points="-50,-30 0,-5 50,-30 0,-55" fill="#2EB4FF" />
                    <text x="0" y="-25" font-family="system-ui" font-size="12" font-weight="bold" fill="#181D24" text-anchor="middle">NAT Engine</text>

                    <!-- Lights -->
                    <circle cx="-20" cy="5" r="3" fill="#2EB4FF" filter="url(#glow)"/>
                    <circle cx="-10" cy="10" r="3" fill="#757D86" id="router-nat-light"/>
                    
                    <text x="0" y="-160" font-family="system-ui" font-size="16" font-weight="bold" fill="#181D24" text-anchor="middle">ראוטר מריץ NAT</text>
                    
                    <rect x="-70" y="50" width="140" height="26" rx="4" fill="#2EB4FF"/>
                    <text x="0" y="68" font-family="monospace" font-size="13" font-weight="bold" fill="#181D24" text-anchor="middle" dir="ltr">Pub: 82.166.50.50</text>
                </g>
            </g>

            <!-- ===================== DOM ORDER 5: PC 2 (Far Right) ===================== -->
            <g transform="translate(1000, 400)">
                <g class="isometric-hover">
                    <g transform="scale(0.7)">
                        <polygon points="-100,10 0,60 100,10 0,-40" fill="rgba(24, 29, 36, 0.1)"/>
                        <polygon points="0,15 100,-35 100,-25 0,25" fill="#0075DB" />
                        <polygon points="-100,-35 0,15 0,25 -100,-25" fill="#181D24" />
                        <polygon points="-100,-35 0,15 100,-35 0,-85" fill="#757D86" />
                        <polygon points="-80,-40 -5,-3 70,-40 -5,-77" fill="#181D24" opacity="0.6" />
                        <polygon points="-100,-35 0,-85 0,-195 -100,-145" fill="#181D24" />
                        <polygon points="-95,-43 -5,-88 -5,-187 -95,-142" fill="#757D86" /> <!-- Inactive Screen -->
                        
                        <text x="0" y="-235" font-family="system-ui" font-size="24" font-weight="bold" fill="#757D86" text-anchor="middle">מחשב 2</text>
                        <text x="0" y="-210" font-family="monospace" font-size="20" font-weight="bold" fill="#757D86" text-anchor="middle" dir="ltr">IP: 192.168.1.11</text>
                    </g>
                </g>
            </g>

            <!-- ===================== DOM ORDER 6: SWITCH (Center) ===================== -->
            <g transform="translate(650, 450)">
                <g class="isometric-hover">
                    <polygon points="-100,10 0,60 100,10 0,-40" fill="rgba(24, 29, 36, 0.1)"/>
                    <polygon points="0,10 100,-40 100,-25 0,25" fill="#0075DB" />
                    <polygon points="-100,-40 0,10 0,25 -100,-25" fill="#181D24" />
                    <polygon points="-100,-40 0,10 100,-40 0,-90" fill="#757D86" />
                    
                    <!-- Ports -->
                    <polygon points="-80,-30 -70,-25 -70,-20 -80,-25" fill="#2EB4FF" />
                    <polygon points="-60,-20 -50,-15 -50,-10 -60,-15" fill="#2EB4FF" />
                    <polygon points="-40,-10 -30,-5 -30,0 -40,-5" fill="#2EB4FF" />
                    <polygon points="-20,0 -10,5 -10,10 -20,5" fill="#2EB4FF" />

                    <text x="0" y="-110" font-family="system-ui" font-size="16" font-weight="bold" fill="#181D24" text-anchor="middle">סוויץ' (LAN)</text>
                </g>
            </g>

            <!-- ===================== DOM ORDER 7: PC 3 (Bottom Right) ===================== -->
            <g transform="translate(900, 600)">
                <g class="isometric-hover">
                    <g transform="scale(0.7)">
                        <polygon points="-100,10 0,60 100,10 0,-40" fill="rgba(24, 29, 36, 0.1)"/>
                        <polygon points="0,15 100,-35 100,-25 0,25" fill="#0075DB" />
                        <polygon points="-100,-35 0,15 0,25 -100,-25" fill="#181D24" />
                        <polygon points="-100,-35 0,15 100,-35 0,-85" fill="#757D86" />
                        <polygon points="-80,-40 -5,-3 70,-40 -5,-77" fill="#181D24" opacity="0.6" />
                        <polygon points="-100,-35 0,-85 0,-195 -100,-145" fill="#181D24" />
                        <polygon points="-95,-43 -5,-88 -5,-187 -95,-142" fill="#757D86" />
                        
                        <text x="0" y="-235" font-family="system-ui" font-size="24" font-weight="bold" fill="#757D86" text-anchor="middle">מחשב 3</text>
                        <text x="0" y="-210" font-family="monospace" font-size="20" font-weight="bold" fill="#757D86" text-anchor="middle" dir="ltr">IP: 192.168.1.12</text>
                    </g>
                </g>
            </g>

            <!-- ===================== DOM ORDER 8: PC 4 (Bottom Center) ===================== -->
            <g transform="translate(650, 650)">
                <g class="isometric-hover">
                    <g transform="scale(0.7)">
                        <polygon points="-100,10 0,60 100,10 0,-40" fill="rgba(24, 29, 36, 0.1)"/>
                        <polygon points="0,15 100,-35 100,-25 0,25" fill="#0075DB" />
                        <polygon points="-100,-35 0,15 0,25 -100,-25" fill="#181D24" />
                        <polygon points="-100,-35 0,15 100,-35 0,-85" fill="#757D86" />
                        <polygon points="-80,-40 -5,-3 70,-40 -5,-77" fill="#181D24" opacity="0.6" />
                        <polygon points="-100,-35 0,-85 0,-195 -100,-145" fill="#181D24" />
                        <polygon points="-95,-43 -5,-88 -5,-187 -95,-142" fill="#757D86" />
                        
                        <text x="0" y="-235" font-family="system-ui" font-size="24" font-weight="bold" fill="#757D86" text-anchor="middle">מחשב 4</text>
                        <text x="0" y="-210" font-family="monospace" font-size="20" font-weight="bold" fill="#757D86" text-anchor="middle" dir="ltr">IP: 192.168.1.13</text>
                    </g>
                </g>
            </g>

            <!-- ===================== NAT TABLE (FLOATING UI) ===================== -->
            <g id="nat-table" opacity="0" transform="translate(250, 60) scale(0.9)">
                <rect x="0" y="0" width="380" height="150" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#0075DB" stroke-width="3"/>
                <rect x="0" y="0" width="380" height="40" rx="12" fill="#0075DB" />
                <rect x="0" y="20" width="380" height="20" fill="#0075DB" />
                
                <text x="190" y="26" font-family="system-ui" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">טבלת תרגום כתובות (NAT Table)</text>
                
                <text x="280" y="65" font-family="system-ui" font-size="14" font-weight="bold" fill="#757D86" text-anchor="middle">כתובת פנימית (LAN)</text>
                <text x="190" y="65" font-family="system-ui" font-size="14" fill="#757D86" text-anchor="middle">→</text>
                <text x="100" y="65" font-family="system-ui" font-size="14" font-weight="bold" fill="#757D86" text-anchor="middle">כתובת ציבורית (WAN)</text>

                <line x1="20" y1="80" x2="360" y2="80" stroke="#757D86" stroke-opacity="0.2" stroke-width="2" />
                
                <g id="nat-row-1" opacity="0" style="transition: opacity 0.5s ease;">
                    <rect x="20" y="90" width="340" height="40" rx="6" fill="#2EB4FF" opacity="0.1" id="nat-row-bg" />
                    <text x="280" y="115" font-family="monospace" font-size="16" font-weight="bold" fill="#181D24" text-anchor="middle" dir="ltr">192.168.1.10</text>
                    <text x="190" y="115" font-family="system-ui" font-size="18" font-weight="bold" fill="#0075DB" text-anchor="middle">⟷</text>
                    <text x="100" y="115" font-family="monospace" font-size="16" font-weight="bold" fill="#0075DB" text-anchor="middle" dir="ltr">82.166.50.50</text>
                </g>
            </g>

            <!-- ===================== DATA PACKET ===================== -->
            <!-- Initialized at PC 1 position -->
            <g id="packet-container" style="opacity: 0; transform: translate(900px, 200px);">
                <g id="packet-visual" transform="translate(0, -40)">
                    <polygon points="0,12 24,-12 24,6 0,30" fill="#0075DB" id="packet-right" />
                    <polygon points="-24,-12 0,12 0,30 -24,6" fill="#181D24" id="packet-left" />
                    <polygon points="-24,-12 0,12 24,-12 0,-36" fill="#2EB4FF" id="packet-top" />
                    
                    <rect x="-70" y="-75" width="140" height="24" rx="6" fill="#FFFFFF" filter="url(#shadow)" opacity="0.95" />
                    <text id="packet-label" x="0" y="-58" font-family="monospace" font-size="12" font-weight="bold" fill="#181D24" text-anchor="middle" dir="ltr">Src: 192.168.1.10</text>
                </g>
            </g>
        </svg>
    </div>

    <!-- ===================== UI PANEL ===================== -->
    <div class="ui-panel">
        <div class="step-indicator">
            <div class="dot active" id="dot-0"></div>
            <div class="dot" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
            <div class="dot" id="dot-4"></div>
            <div class="dot" id="dot-5"></div>
        </div>
        <h2 id="ui-title">מה זה NAT? (Network Address Translation)</h2>
        <p id="ui-desc">רשת מקומית (LAN) משתמשת בכתובות "פרטיות" (כמו 192.168.x.x) שלא מורשות לגלוש באינטרנט. תפקיד הראוטר הוא לבצע NAT - לתרגם את כל הכתובות של המחשבים בבית לכתובת "ציבורית" אחת חוקית.</p>
        <div class="controls">
            <button id="next-btn" onclick="nextStep()">התחל סימולציה</button>
        </div>
    </div>
</div>

<script>
    // --- EXACT Layout Positions for Routing ---
    const pos = {
        pc1: { x: 900, y: 200 },
        switch: { x: 650, y: 450 },
        router: { x: 400, y: 400 },
        server: { x: 150, y: 300 }
    };
    
    // Palette
    const colors = {
        private: '#757D86', // Gray for local LAN
        nat: '#0075DB',     // Dark Blue for translation process
        public: '#2EB4FF',  // Light Blue for Internet WAN
        response: '#181D24' // Dark for return trip
    };

    let currentStep = 0;
    let isAnimating = false;

    // DOM Elements
    const packetContainer = document.getElementById('packet-container');
    const packetLabel = document.getElementById('packet-label');
    const packetTop = document.getElementById('packet-top');
    
    const uiTitle = document.getElementById('ui-title');
    const uiDesc = document.getElementById('ui-desc');
    const nextBtn = document.getElementById('next-btn');
    
    const natTable = document.getElementById('nat-table');
    const natRow1 = document.getElementById('nat-row-1');
    const natRowBg = document.getElementById('nat-row-bg');
    const routerNatLight = document.getElementById('router-nat-light');

    // --- State Machine ---
    const stepsData = [
        {
            title: "מה זה NAT? (Network Address Translation)",
            desc: "רשת מקומית (LAN) משתמשת בכתובות פרטיות (כמו 192.168.x.x) שלא מורשות לגלוש באינטרנט. תפקיד הראוטר הוא לבצע NAT - לתרגם את כל הכתובות של המחשבים בבית לכתובת ציבורית אחת חוקית.",
            btn: "התחל סימולציה",
            action: () => { resetVisuals(); }
        },
        {
            title: "שלב 1: בקשה מהרשת המקומית",
            desc: "מחשב 1 רוצה לגלוש לאתר (8.8.8.8). הוא אורז את הבקשה בחבילה שהמקור שלה (Source) הוא הכתובת הפרטית שלו - 192.168.1.10. החבילה נשלחת דרך הסוויץ' אל הראוטר.",
            btn: "המשך לשלב הבא",
            action: () => { 
                triggerPacketMultiPath([pos.pc1, pos.switch, pos.router], 'Src: 192.168.1.10', colors.private, () => {
                    routerNatLight.setAttribute('fill', colors.private);
                });
            }
        },
        {
            title: "שלב 2: תרגום כתובת (NAT Outbound)",
            desc: "הראוטר עוצר את החבילה. הוא מבין שעם כתובת פרטית אי אפשר לצאת לאינטרנט. הראוטר רושם ב'טבלת ה-NAT' שלו את השיוך, ומחליף את כתובת המקור לכתובת הציבורית שלו עצמו (82.166.50.50).",
            btn: "המשך לשלב הבא",
            action: () => { 
                showNatTable();
                setTimeout(() => {
                    packetTop.setAttribute('fill', colors.nat);
                    packetLabel.textContent = 'Src: 82.166.50.50';
                    packetLabel.style.fill = colors.nat;
                    highlightNatRow();
                }, 800);
            }
        },
        {
            title: "שלב 3: שליחה לאינטרנט",
            desc: "עכשיו כשהחבילה חוקית, הראוטר שולח אותה לשרת באינטרנט. מבחינת השרת, הבקשה הגיעה מהראוטר (ולא מהמחשב הפרטי, שאותו השרת בכלל לא מכיר).",
            btn: "המשך לשלב הבא",
            action: () => { 
                triggerPacketMultiPath([pos.router, pos.server], 'Src: 82.166.50.50', colors.public, () => {
                    routerNatLight.setAttribute('fill', '#757D86');
                    hideNatTable();
                });
            }
        },
        {
            title: "שלב 4: תגובה מהשרת",
            desc: "השרת מעבד את הבקשה ושולח את המידע חזרה אל הכתובת שפנתה אליו - הכתובת הציבורית של הראוטר (Destination: 82.166.50.50).",
            btn: "המשך לשלב הבא",
            action: () => { 
                triggerPacketMultiPath([pos.server, pos.router], 'Dst: 82.166.50.50', colors.response, () => {
                    showNatTable();
                });
            }
        },
        {
            title: "שלב 5: תרגום הפוך (NAT Inbound)",
            desc: "הראוטר מקבל את התשובה, מסתכל בטבלת ה-NAT ונזכר שמי שביקש את המידע במקור היה מחשב 1. הוא מחליף בחזרה את כתובת היעד ל-192.168.1.10 ומעביר למחשב. קסם!",
            btn: "התחל מחדש",
            action: () => { 
                highlightNatRow();
                setTimeout(() => {
                    packetTop.setAttribute('fill', colors.private);
                    packetLabel.textContent = 'Dst: 192.168.1.10';
                    packetLabel.style.fill = colors.private;
                    
                    setTimeout(() => {
                        triggerPacketMultiPath([pos.router, pos.switch, pos.pc1], 'Dst: 192.168.1.10', colors.private, () => {
                            setTimeout(hideNatTable, 1000);
                        });
                    }, 800);
                }, 800);
            }
        }
    ];

    function nextStep() {
        if (isAnimating) return;
        currentStep++;
        if (currentStep >= stepsData.length) currentStep = 0;
        updateUI();
        stepsData[currentStep].action();
    }

    function updateUI() {
        const data = stepsData[currentStep];
        uiTitle.innerText = data.title;
        uiDesc.innerText = data.desc;
        nextBtn.innerText = data.btn;

        for(let i=0; i<6; i++) {
            const dot = document.getElementById(`dot-${i}`);
            if (i < currentStep) dot.className = "dot completed";
            else if (i === currentStep) dot.className = "dot active";
            else dot.className = "dot";
        }
    }

    function triggerPacketMultiPath(waypoints, text, mainColor, onComplete) {
        isAnimating = true;
        nextBtn.disabled = true;

        packetTop.setAttribute('fill', mainColor);
        packetLabel.textContent = text;
        packetLabel.style.fill = mainColor;

        packetContainer.style.transition = 'none';
        packetContainer.style.transform = `translate(${waypoints[0].x}px, ${waypoints[0].y}px)`;
        packetContainer.style.opacity = '0';

        let currentWp = 0;

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                packetContainer.style.opacity = '1';
                moveToNextWp();
            });
        });

        function moveToNextWp() {
            currentWp++;
            if (currentWp >= waypoints.length) {
                isAnimating = false;
                nextBtn.disabled = false;
                if (onComplete) onComplete();
                return;
            }

            packetContainer.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            packetContainer.style.transform = `translate(${waypoints[currentWp].x}px, ${waypoints[currentWp].y}px)`;

            setTimeout(() => {
                if (currentWp < waypoints.length - 1) setTimeout(moveToNextWp, 100);
                else moveToNextWp();
            }, 1200);
        }
    }

    function showNatTable() {
        natTable.style.opacity = '1';
        natTable.style.transform = 'translate(250px, 80px) scale(0.9)';
        setTimeout(() => natRow1.style.opacity = '1', 300);
    }

    function hideNatTable() {
        natTable.style.opacity = '0';
        natTable.style.transform = 'translate(250px, 100px) scale(0.85)';
        natRow1.style.opacity = '0';
        natRowBg.setAttribute('fill', '#2EB4FF');
    }

    function highlightNatRow() {
        natRowBg.setAttribute('fill', '#0075DB');
        natRowBg.setAttribute('opacity', '0.3');
        setTimeout(() => {
            natRowBg.setAttribute('fill', '#2EB4FF');
            natRowBg.setAttribute('opacity', '0.1');
        }, 500);
    }

    function resetVisuals() {
        packetContainer.style.transition = 'none';
        packetContainer.style.opacity = '0';
        packetContainer.style.transform = `translate(${pos.pc1.x}px, ${pos.pc1.y}px)`;
        hideNatTable();
        routerNatLight.setAttribute('fill', '#757D86');
    }

    updateUI();
</script>
</body>
</html>
